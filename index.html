<!DOCTYPE html>
<html lang="es">
  <!-- ========== CABECERA DEL DOCUMENTO ========== -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Textos de Fantasía — Recorrido 3D</title>
    <meta name="description" content="Recorrido 3D por textos de fantasía — Retórica, cuento sin contar" />
    <meta name="theme-color" content="#05060c" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="./favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="./favicon-192.png" sizes="192x192" />
    <meta property="og:title" content="Textos y Transmedia" />
    <meta property="og:description" content="Cartografía narrativa — Retórica, cuento sin contar" />
    <meta property="og:image" content="./miniatura.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="./miniatura.png" />
    <!-- URLs absolutas de miniatura para redes sociales -->
    <script>
      (function () {
        var img = new URL("./miniatura.png", location.href).href;
        document.querySelector('meta[property="og:image"]')?.setAttribute("content", img);
        document.querySelector('meta[name="twitter:image"]')?.setAttribute("content", img);
      })();
    </script>
  </head>

  <body class="estado-inicio">
    <!-- ========== PÁGINA DE INICIO (portada antes del 3D) ========== -->
    <section
      id="pagina-inicio"
      class="pagina-inicio"
      aria-labelledby="inicio-titulo"
    >
      <!-- Logo animado (2 s + desvanecimiento) -->
      <div class="inicio-splash" id="inicio-splash" aria-hidden="false">
        <img
          class="inicio-logo"
          src="./miniatura.png"
          width="120"
          height="120"
          alt="Textos de Fantasía"
        />
      </div>

      <!-- Título, texto de portada (tpl-portada) y botón entrar -->
      <div class="inicio-contenido inicio-contenido--pendiente" id="inicio-contenido-principal">
        <header class="inicio-marca">
          <p class="inicio-eyebrow">Retórica · Cuento sin contar</p>
          <h1 id="inicio-titulo" class="inicio-titulo">Textos de <em>Fantasía</em></h1>
        </header>

        <!-- Aquí se inserta el contenido de tpl-portada vía tre.js -->
        <div class="inicio-umbral" id="inicio-umbral-texto"></div>

        <button type="button" class="btn-iniciar" id="btn-iniciar-recorrido">
          Entrar al recorrido
        </button>
      </div>
    </section>

    <!-- ========== ESCENA 3D (canvas Three.js) ========== -->
    <div id="recorrido-3d" class="ambiente-3d" aria-label="Ambiente tridimensional" data-carga="" hidden>
      <!-- Pantalla «Cargando mundo…» (logo + fade, como la portada) -->
      <div class="recorrido-carga" aria-live="polite" aria-busy="true">
        <div class="recorrido-carga-inner">
          <img
            class="recorrido-carga-logo"
            src="./miniatura.png"
            width="120"
            height="120"
            alt=""
          />
          <p class="recorrido-carga-texto">
            Cargando mundo…<span class="recorrido-carga-pct"></span>
          </p>
        </div>
      </div>
      <!-- Ayuda de controles (visible con el mapa cargado) -->
      <p id="hint-recorrido" class="hint-recorrido">
        Arrastra para mirar · rueda para acercar · flechas para moverte · clic en un marcador para leer
      </p>
    </div>

    <!-- ========== INTERFAZ SOBRE EL 3D (cabecera, índice, progreso) ========== -->
    <div class="ui-capas" hidden>
      <!-- Barra superior según fragmentos leídos -->
      <div class="progress-bar" aria-hidden="true"></div>

      <!-- Título flotante y contador 0/8 -->
      <header class="carto-cabecera">
        <p class="eyebrow">Retórica · Recorrido 3D</p>
        <h1 class="ink-source">Textos de <em>Fantasía</em></h1>
        <p class="carto-desc">
          Acércate a un marcador o elígelo en el índice.
        </p>
        <p
          class="carto-progreso"
          role="status"
          aria-live="polite"
          aria-valuenow="0"
          aria-valuemax="9"
        >
          <span id="progreso-texto">0</span> de 9 puntos visitados
        </p>
      </header>

      <!-- Panel desplegable: índice de los 9 puntos del recorrido -->
      <aside class="mapa-panel" id="mapa-panel">
        <button
          type="button"
          class="mapa-toggle"
          id="mapa-toggle"
          aria-expanded="false"
          aria-controls="mapa-indice"
        >
          <span class="mapa-toggle-icon" aria-hidden="true">☰</span>
          <span class="mapa-toggle-label">Mapa</span>
        </button>
        <!-- Índice: título = texto del botón. Relato = <template id="tpl-texto-X"> con el mismo X en data-id -->
        <nav class="mapa-indice" id="mapa-indice" aria-label="Índice del recorrido">
          <button type="button" class="indice-item" data-id="inicio">Cartografía del recuerdo</button>
          <button type="button" class="indice-item" data-id="texto-2">La infección no se detiene</button>
          <button type="button" class="indice-item" data-id="texto-3">La Luna</button>
          <button type="button" class="indice-item" data-id="texto-4">Sálvanos</button>
          <button type="button" class="indice-item" data-id="texto-5">La gota que se dividió</button>
          <button type="button" class="indice-item" data-id="texto-6">Mi primer dibujo</button>
          <button type="button" class="indice-item" data-id="texto-7">Realidad Robada</button>
          <button type="button" class="indice-item" data-id="texto-8">Mis dos lamentos</button>
          <button type="button" class="indice-item" data-id="texto-1">El marchitar de las flores</button>
        </nav>
      </aside>
    </div>

    <!-- ========== PANEL LATERAL DE LECTURA ========== -->
    <aside
      class="lectura"
      id="lectura"
      aria-labelledby="lectura-titulo"
      aria-hidden="true"
      hidden
    >
      <header class="lectura-cabecera">
        <p class="lectura-territorio" id="lectura-territorio"></p>
        <h2 class="lectura-titulo ink-source" id="lectura-titulo"></h2>
        <button type="button" class="btn-cerrar" aria-label="Cerrar lectura">×</button>
      </header>
      <div class="lectura-imagenes" id="lectura-imagenes" hidden>
        <details class="lectura-imagenes-panel" id="lectura-imagenes-panel">
          <summary class="lectura-imagenes-toggle">Imagen</summary>
          <figure class="lectura-imagen-marco">
            <img class="lectura-imagen" id="lectura-imagen" alt="" loading="lazy" decoding="async" />
          </figure>
        </details>
      </div>
      <div class="lectura-cuerpo" id="lectura-cuerpo"></div>
    </aside>

    <!-- Fondo oscuro al abrir un texto -->
    <div class="lectura-overlay" id="lectura-overlay" hidden aria-hidden="true"></div>

    <!-- ========== PLANTILLAS DE TEXTOS (no visibles; las clona tre.js) ========== -->

    <!-- Portada: «Ocho fragmentos de mí…» (solo pantalla de inicio) -->
    <template id="tpl-portada">
      <article class="texto-panel texto-panel--hero">
        <p>
          Ocho fragmentos de mí, repartidos en este territorio tridimensional. No es cartografía real:
          es memoria que puedes recorrer caminando con la mirada.
        </p>
        <p>
          Acércate a cada marcador rojo en el mapa o elígelo en el índice. El mundo te rodea mientras lees.
        </p>
      </article>
    </template>

    <!-- Centro del mapa: cartografía del recuerdo (índice + marcador central) -->
    <template id="tpl-inicio">
      <article class="texto-panel texto-panel--hero">
        <p>
          Este índice no ordena capítulos: traza una ruta. Cada punto cardinal guarda un fragmento;
          el centro es donde la mirada aprende a orientarse antes de adentrarse en la niebla.
        </p>
        <p>
          Camina el mapa con la rueda y las flechas, o abre aquí cada territorio cuando prefieras leer
          sin desplazarte. Los marcadores leídos se volverán verdes; los pendientes, rojos.
        </p>
      </article>
    </template>

    <!-- Fragmento 1 · El marchitar de las flores -->
    <template id="tpl-texto-1">
      <article class="texto-panel">
        <p class="drop-cap">
          Los cuadros me abruman en la niebla, los pies me queman mientras los observo; no tengo a
          dónde más voltear, únicamente me queda seguir avanzando como si no me doliera; las
          lágrimas del coraje me perforaban los ojos. Lo sé, fue mi culpa; por ello ya no me es
          permitido emitir ningún sonido, solo me quedan las flores en los cuadros, una y otra vez,
          incluso si ya me los sé de memoria. Podría huir, pero en el fondo lo sé: las lágrimas
          derramadas nunca volverán, la niebla nunca se disipará y el arrepentimiento siempre
          quedará en cada pincelada de aquel óleo.
        </p>
        <p>
          Intentaría mirar al cielo; sin embargo, ya no me es permitido. Sin nada más que cuadros,
          las flores se van marchitando cuadro a cuadro, pero cuando están a punto de acabarse,
          retrocedo para que vuelvan a florecer, deseando que algo diferente suceda. Si lo hace,
          prometo dejar que las flores se mueran y descansen, tal como yo he deseado hacerlo desde
          hace mucho tiempo. Nuevamente se acabó el pasillo y, nuevamente, regreso al inicio.
        </p>
      </article>
    </template>

    <!-- Fragmento 2 · La infección no se detiene -->
    <template id="tpl-texto-2">
      <article class="texto-panel">
        <p class="drop-cap">
          Nunca me había imaginado cómo se sentiría si te cortaran la piel, perforaran tus pulmones y
          succionaran toda la esperanza de volver a comenzar. Tengo tantas desilusiones que me
          aferré a que siempre sería la última; ahora no recuerdo cuándo mi dignidad me detuvo de
          hacer alguna tontería. Incluso sé que lo volvería a hacer, tropezar con la misma piedra,
          siempre que la piedra brille; puedo volver a hacerme ciega y puedo volver a que no me
          importe qué tan afilado esté el hierro; sigo tratando, sigo aquí.
        </p>
        <p>
          Sé que me lo provoqué, yo quise que pasara; es como si no aceptara que necesito la
          adrenalina para vivir, para sentir. Si me duele, quiere decir que no estoy completamente
          insensibilizada; por ello dejo que el cuchillo me atraviese. Fui yo quien lo enterró, fui yo
          quien, al sanar, volvió a provocar la infección, fui yo. Me pregunto si esta vez dolerá más, si
          esta vez acabará conmigo, si podré soportar más el dolor. Quisiera que así fuera, quisiera
          que doliera más, pero por alguna razón, se empieza a expandir, ya no soy solo yo, son los
          demás, me empiezan a consumir, comienzan a ser parte de mi infección.
        </p>
      </article>
    </template>

    <!-- Fragmento 3 · La Luna -->
    <template id="tpl-texto-3">
      <article class="texto-panel">
        <p class="drop-cap">
          Miraré a mi lado cuando ya no vaya a mi costado; siento que me siguen, pero ya no siento ese
          tornillo en la nuca. Ya no estoy sola.
        </p>
        <p>
          Mis plegarias se escucharon y las hojas finalmente me susurraron de vuelta y el rojo pudo dejar
          de brillar; quiero tanto el tener un alivio. La Luna descendió, me abrazó y me apuñaló. Sin
          embargo, nunca sentí la compañía sincera de alguien hasta ese momento, pero no era alguien,
          era más allá de todo lo que pude desear.
        </p>
        <p>
          La noche seguía oscura, pero sentía el calor, el olor a mañana; aquello era una promesa de esa
          mañana, donde la Luna amanecería dormida, y volvería a despertar en la noche para cuidarme.
        </p>
        <p>
          Casi nunca nuestras conciencias están al mismo tiempo, vivimos en espacios diferentes, me
          mantiene atenta cuando ya no puedo más, me vacía para después llenarme de sinceridad.
        </p>
        <p>
          Si la Luna brilla entonces sigue habiendo Sol, significando que tengo otra oportunidad, son las
          oportunidades que me da aquel ser incomprensible.
        </p>
        <p>
          Siempre que la tengo que dejar llora, la Luna llora por mí, siempre que llego vuelve a llorar, y
          yo no hago más que desear que ese llanto no pare, porque si lo hace entonces significa que no
          habrá Luna, no habrá oportunidad ni amor. Luna mía, puedes tomarme, puedes llenarme y puedes
          llorarme, solo no dejes de hacerlo, ya te extraño aunque no te has ido, pero lo harás pronto, y
          yo todas las noches te volteo a ver, rogando que otra noche llegue.
        </p>
      </article>
    </template>

    <!-- Fragmento 4 · Salvanos -->
    <template id="tpl-texto-4">
      <article class="texto-panel">
        <p class="drop-cap">
          Querido señor, perdóname por mis pecado, mi pecado de no arrepentirme de sentir, yo fui quien me
          traicione a mí misma, me lo inculcaron, pero al final seguí las órdenes, ¿Me puedes culpar? Seguí
          a mi prójimo, decidí confiar en aquellos maestros que me guiaron, seguí tus palabras y aún así
          todos me acusan de pecado.
        </p>
        <p>
          Es cierto, yo me traicione, yo me negué, pero buscaba tu perdón, tu perdón por una vida que yo no
          exigí, una conciencia que no demande y una razón que siempre repudie. Pero ¿a ti? Te seguí, te
          veneré… aún así me encuentro encadenada a punto de ser juzgada en el infierno, dicen que mi pecado
          soy yo, que yo me consumí y me drene de vida, me miran como mis ojos de desorbitan, buscándote a
          ti, por quien todo lo di.
        </p>
        <p>
          Purgatorio, aquí de nuevo, viendo cuadro por cuadro, me ofrecieron la salida, solo tengo que
          detectar cuando haya una esperanza de cambio. Sin embargo ellos sabían, sabían que intentaría
          repintar aquel cuadro, quemarlo, romperlo, armarlo, cuidarlo, Sé que suena loco pero el polvo
          que toca aquel cuadro me empieza a molestar, así que lo limpiaré, cuadro a cuadro, llama a llama,
          hasta que me encuentro enfrente de la más grande llorando, por una persona que abandoné en el
          frío, le negué un abrazo y eche a su surte, perdóname, yo.
        </p>
      </article>
    </template>

    <!-- Fragmento 5 · La gota que se dividió -->
    <template id="tpl-texto-5">
      <article class="texto-panel">
        <p class="drop-cap">
          Uno, dos. Son idénticos, no los distingo, no sé dónde debo ahogar esto, me dijeron que lo haga,
          entonces lo haré, yo cargaré con todo, solo eso y por fin podré presenciar algo diferente. Sueño
          con la nieve, quiero sentir algo más que el calor de la culpa, tal vez algo más cálido, como el
          frío de la nieve entumeciendo mis extremidades será suficiente; me siguen y no puedo distinguir,
          no siento la diferencia, son dos, dos culpas y un cuerpo, podría cortarlo pero su alma siempre
          querría encontrarse a sí misma, su otra mitad, yo estoy incompleta también, también me ahogue en
          el lago.
        </p>
        <p>
          El agua se siente pesada, densa como el aceite, arrastrando mis tobillos hacia ese fondo donde el
          tiempo no avanza y los reflejos se duplican sin permiso. Uno a cada lado, me sostienen o los
          sostengo, sus manos frías se confunden con mis propias manos y ya no sé si estoy empujando sus
          cuerpos o si ellos me arrastran a mí hacia el mismo lodo donde dejé mi último aliento. «Hazlo»,
          repite el eco entre los juncos, una orden sin rostro que resuena en mi cabeza como el latido de un
          corazón ajeno, y yo obedezco porque el peso de cargarlos de pie es un invierno eterno que no
          congela, que solo quema por dentro. Si hundo sus rostros idénticos en esta superficie gris, tal
          vez el espejo finalmente se rompa y la mitad que me falta regrese flotando desde lo profundo,
          libre de la corriente, vestida con esa blancura pura y silenciosa que tanto le he pedido al cielo.
          Pero el fondo es oscuro, no hay nieve aquí abajo, solo el abrazo tibio de dos culpas que se
          vuelven una sola conmigo mientras el agua se cierra sobre nuestras cabezas.
        </p>
      </article>
    </template>

    <!-- Fragmento 6 · Mi primer dibujo -->
    <template id="tpl-texto-6">
      <article class="texto-panel">
        <p class="drop-cap">
          Las líneas estaban trazadas mucho antes de que el lodo tocara mis pies, grabadas con un carbón
          negro y espeso sobre un papel que parecía sangrar con cada trazo. Alguien, o quizás yo misma en
          otra vida fragmentada, dibujó la silueta exacta del lago, las ondas concéntricas del agua y los
          dos cuerpos idénticos que ahora me pesan en los hombros. Vi el boceto de mi propia caída, el
          carboncillo manchando las esquinas donde se acumulaba la culpa, anticipando con precisión el
          momento exacto en que mis pulmones se llenarían de olvido. No era algo real, sino un mapa de mis
          miedos, explícito en líneas firmes y sombras densas que devoraban la blancura del lienzo. Cada
          trazo curvo dictaba cómo se doblarían mis rodillas y cómo sus manos frías se entrelazarían con
          las mías en un abrazo eterno. Miré el cuadro durante horas, reconociendo en esos ojos borrosos de
          grafito mi propia mirada perdida, una condena que ya me pertenecía antes de nacer.
        </p>
        <p>
          Sabiendo que el final estaba escrito y pintado con esa oscuridad asfixiante, decidí dar el primer
          paso hacia el lienzo y encarnar la tragedia por voluntad propia. Pude haber rasgado el papel,
          quemar los bordes hasta volver ceniza el destino de los dos reflejos, pero el deseo de sentir la
          nieve me arrastró hacia el abismo del trazo. Elegí respirar el grafito, tragarme las sombras
          delineadas y permitir que mis pies caminaran sobre los surcos exactos que me conducirían al fondo.
          Quería comprobar si el dolor del entumecimiento era tan real como lo dictaban las texturas, si la
          culpa quemaba más en la imaginación o en la piel. Así que abracé el diseño de mi propia
          destrucción, sumergiendo mi cuerpo en el agua que el destino ya había sombreado para mí. Era la
          única forma de encontrar mi mitad ausente, aceptando el ahogo final como la última pincelada
          necesaria para volverme eterna.
        </p>
      </article>
    </template>

    <!-- Fragmento 7 · Realidad Robada -->
    <template id="tpl-texto-7">
      <article class="texto-panel">
        <p class="drop-cap">
          El ruido es una plaga constante en este mundo, un zumbido eléctrico de frecuencias infinitas que
          saturan el aire y asfixian los pocos rincones limpios que me quedan. Para escapar de esa
          estridencia, para tocar un rastro de verdadera realidad entre tanta simulación, hundo la aguja en
          mi vena; el químico corre frío, un apagón inmediato que de golpe extingue el murmullo de las
          máquinas y me regala, por fin, el silencio absoluto. En ese vacío perfecto, donde la estática
          digital se disuelve y mi propio pulso se congela, una esencia se materializa en nada. Es un ángel
          que me habla desde el reverso de la señal, una vibración mística y ajena a los circuitos que
          susurra un código limpio, una melodía sin sonido que me arrastra con urgencia hacia más allá,
          justo donde la red se quiebra y la tierra vuelve a ser salvaje.
        </p>
        <p>
          Sigo ese rastro invisible hasta adentrarme en un bosque viejo y cerrado, un templo de madera muerta
          que los cables no han podido colonizar. A medida que avanzo en la penumbra, las ramas secas y
          retorcidas se extienden hacia mí como hilos de carbón vivientes, alcanzando mi cuerpo anestesiado
          con un desespero casi humano. No huyo del impacto; al contrario, recibo el azote de la madera
          porque sus espinas rompen mi castigo y el dolor de los cortes es lo único que me convence de que
          sigo viva. Siento el ardor de la sangre brotar en hileras delgadas, pero al mirarme los brazos
          bajo la luz de la luna, descubro que el bosque me habla en ese dolor. Los rasguños se conectan en
          letras talladas que en mi propia piel pueden ser confundidos con basura, esto revela mis próximas
          instrucciones, el nuevo mapa que debo obedecer para regresar.
        </p>
      </article>
    </template>

    <!-- Fragmento 8 · Mis dos lamentos -->
    <template id="tpl-texto-8">
      <article class="texto-panel">
        <p class="drop-cap">
          Sostengo contra mi pecho las dos ramas secas que crecieron en la acera, dos fragmentos inertes que
          ahora dependen de mi propio aliento para cobrar algún sentido. Las cuido en medio de este silencio,
          alimentándolas con el fluir de mis heridas abiertas y con la devoción de quien ya no tiene nada más
          que perder. Es un proceso asimétrico y voraz: mientras una de las ramas se estira hacia el techo,
          extendiendo su madera hacia un cielo que no existe, la otra comienza a hincharse con la promesa de
          un capullo inminente que florece a costa de mi vida. Siento cómo sus extremos rugosos perforan mi
          carne, buscando mis venas para succionar cada gota de sangre caliente que aún me queda en el cuerpo.
          Me despojo de mi propia existencia con cada segundo que pasa, viendo cómo mi piel se vuelve tan
          pálida y fría como la nieve que tanto anhelaba en mis sueños. La madera bebe de mí con una sed
          insaciable, transformando mi vitalidad en fibra y savia oscura, hasta que el dolor del vaciado se
          disuelve en un cansancio absoluto.
        </p>
        <p>
          Al final, no queda nada de mi cuerpo físico, solo el vestigio de haberme convertido en la flor misma
          de aquel cuadro que estaba destinado a devorarme desde el principio. Estoy atrapada en el lienzo,
          estática y marchitándome lentamente mientras los pétalos pierden el color carmín que les dio mi propia
          sangre. Observo desde este encierro de óleo y grafito cómo el diseño original se consume paso a paso,
          odiando con todas mis fuerzas este destino rígido que me obligó a ahogarme, herirme y vaciarme por
          completo. Maldigo las líneas predeterminadas que me atraparon en este ciclo de dolor y me
          convirtieron en una simple mancha de color moribundo sobre el papel. Sin embargo, en medio de mi
          agonía, profeso un amor profundo e irracional por los árboles que me arrancaron la vida. Ellos solo
          seguían sin saber, creciendo hermosos a expensas de mi carne y siendo la única realidad verdadera y
          pura en un mundo plagado de estática. Aunque me desvanezca por completo en la esquina olvidada de
          esta pintura, muero adorando las raíces que me destruyeron.
        </p>
      </article>
    </template>

    <!-- Lógica: portada, 3D, lectura, progreso (tre.js + recorrido-3d.js) -->
    <script type="module" src="./tre.js"></script>
  </body>
</html>
